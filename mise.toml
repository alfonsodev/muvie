  
[tasks.deploy]
run = [
'npx expo export --platform ios --profile production',
'eas build --platform ios --profile production',
'eas submit --platform ios --latest'
]
[tasks.publish]
run = [
  'node apps/mobile/scripts/set-build-meta.js',
  'cd apps/mobile && eas build --platform ios --profile production --auto-submit'
]

[tasks.log]
run = 'sudo docker logs -f muvie-web'
